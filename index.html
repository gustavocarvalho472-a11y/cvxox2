<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥇</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gold Desk — XAUUSD · FTMO</title>
    <meta name="description" content="Cockpit de trading XAUUSD para passar o FTMO Challenge: rotina pré-sessão, validador de trade com guard-rails de risco e agente IA copiloto." />
    <meta name="theme-color" content="#09090b" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gold Desk" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Auto-cura de cache velho: se o bundle (hash antigo → 404) não montar o app
      // em 4s, recarrega UMA vez com cache-buster. Guarda em sessionStorage evita loop.
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0 && !sessionStorage.getItem('gd_cachefix')) {
          sessionStorage.setItem('gd_cachefix', '1');
          location.replace(location.pathname + '?v=' + Date.now());
        }
      }, 4000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
